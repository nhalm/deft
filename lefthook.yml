pre-commit:
  parallel: true
  commands:
    eval-structure:
      run: make test.eval.check-structure
    format:
      run: mix format --check-formatted
      glob: "*.{ex,exs}"
    lint:
      run: mix credo --strict
    compile:
      run: mix compile --warnings-as-errors

pre-push:
  commands:
    test:
      run: mix test --exclude eval
    integration:
      run: mix test --only integration --no-start 2>/dev/null || true
      skip: true  # Enable when integration tests exist
