pre-commit:
  parallel: true
  commands:
    eval-structure:
      run: make test.eval.check-structure
      skip: true  # Skip until eval tests are unblocked (all eval work is blocked in specd_work_list.md)
    format:
      run: mix format --check-formatted
      glob: "*.{ex,exs}"
    lint:
      run: mix credo --strict
    compile:
      run: mix compile --warnings-as-errors
    dialyzer:
      run: mix dialyzer

pre-push:
  commands:
    test:
      run: mix test --exclude eval
    integration:
      run: mix test --only integration --no-start 2>/dev/null || true
